spring:
  application:
    name: cloudorderx-backend

  datasource:
    url: jdbc:h2:mem:cloudorderxdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  profiles:
    active: dev

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: ${spring.application.name}

app:
  jwt:
    secret: "cloudorderx-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256"
    expiration: 86400000   # 24 hours in ms

logging:
  level:
    com.cloudorderx: DEBUG
    org.springframework.web: INFO
