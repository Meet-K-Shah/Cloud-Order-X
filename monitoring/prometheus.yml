# Prometheus scrape configuration for CloudOrderX
global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    env: 'dev'
    project: 'cloudorderx'

# Alertmanager integration (optional — wire up your own)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['alertmanager:9093']

# Rule files
rule_files:
  - "rules/order_alerts.yml"

scrape_configs:

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot backend (Micrometer /actuator/prometheus)
  - job_name: 'cloudorderx-backend'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 10s
    static_configs:
      - targets: ['backend:8080']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # ETL microservice
  - job_name: 'etl-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['etl-service:8001']

  # Reporting microservice
  - job_name: 'reporting-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['reporting-service:8002']

  # Notification microservice
  - job_name: 'notification-service'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['notification-service:8003']
