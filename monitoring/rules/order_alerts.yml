groups:
  - name: cloudorderx_alerts
    rules:

      # High error rate on backend
      - alert: HighBackendErrorRate
        expr: |
          rate(http_server_requests_seconds_count{job="cloudorderx-backend", status=~"5.."}[5m])
          / rate(http_server_requests_seconds_count{job="cloudorderx-backend"}[5m]) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High backend HTTP error rate ({{ $value | humanizePercentage }})"

      # ETL pipeline failures
      - alert: ETLPipelineFailure
        expr: increase(etl_runs_total{status="error"}[30m]) > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "ETL pipeline failed in the last 30 minutes"

      # Backend instance down
      - alert: BackendDown
        expr: up{job="cloudorderx-backend"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CloudOrderX backend is unreachable"

      # High JVM heap usage
      - alert: HighJVMHeap
        expr: |
          jvm_memory_used_bytes{area="heap"} 
          / jvm_memory_max_bytes{area="heap"} > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM heap usage above 85% ({{ $value | humanizePercentage }})"

      # Slow API responses
      - alert: SlowAPIResponses
        expr: |
          histogram_quantile(0.95,
            rate(http_server_requests_seconds_bucket{job="cloudorderx-backend"}[5m])
          ) > 2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "95th percentile API latency above 2s"
